name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  foundry:
    name: Foundry build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.5.1

      - name: Build
        run: forge build

      - name: Test
        run: forge test
